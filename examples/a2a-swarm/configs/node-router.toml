# node-router — the dispatcher.
#
# Uses the CheapestUnderLatency selector with a LowestLatency fallback.
# At startup, the A2aServer reads `[routing.peers]` and spawns an async
# discovery task per peer: each URL is fetched via the A2A client
# (`GET /.well-known/agent.json`), the resulting AgentCard is inserted
# into the in-memory `PeerRegistry`, and a `Router` is attached to the
# server's state. Incoming `tasks/send` calls then consult the router
# after policy admission and forward via `Executor::Remote`.
#
# `allowed_skills = []` on the router's local policy deliberately
# forbids this node from handling `echo` locally — routing is required,
# and if it fails the task is rejected. That turns the demo into an
# honest signal: if the router's logs don't show a `task forwarded`
# line the demo fails fast instead of silently falling through to a
# local echo.

[policy.default]
max_cost_usd    = 0.10
max_duration_ms = 30_000
allowed_skills  = ["echo"]

[budget.global]
max_usd_per_minute = 10.00
overflow           = "shed"

[recursion]
max_call_depth = 4
deny_revisit   = true

[routing]
default_selector  = "cheapest_under_latency"
latency_budget_ms = 2_000
fallback          = "lowest_latency"

[[routing.peers]]
url = "http://127.0.0.1:18001"

[[routing.peers]]
url = "http://127.0.0.1:18002"
