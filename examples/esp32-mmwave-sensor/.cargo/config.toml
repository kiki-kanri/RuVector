# Default target: ESP32-S3 (matches the Waveshare ESP32-S3-Touch-AMOLED-1.8
# board described in ADR-SYS-0026, currently attached on /dev/ttyACM0).
[build]
target = "xtensa-esp32s3-espidf"

# esp-idf-sys's build.rs emits the right --ldproxy-linker= flags during the
# build script; we just point the linker at ldproxy and let it route.
[target.xtensa-esp32s3-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"

[env]
ESP_IDF_VERSION = "v5.1.2"
ESP_IDF_SDKCONFIG_DEFAULTS = "sdkconfig.defaults;sdkconfig.defaults.esp32s3"

# Build std for `xtensa-esp32s3-espidf` — esp-idf-sys requires it.
[unstable]
build-std = ["std", "panic_abort"]

[alias]
flash   = "espflash flash --monitor"
monitor = "espflash monitor"
