# cargo-deny config for ruvector-hailo.
#
# Run with `cargo deny check` after installing cargo-deny.
# Iter 177 — added during the security/optimize/bench sprint to mirror
# the cluster crate's gate (deny.toml lives next door at
# crates/ruvector-hailo-cluster/deny.toml).
#
# Closes ADR-172 §5b/§5c (build supply chain hardening) for the
# ruvector-hailo half of the dep tree, particularly the
# `--features cpu-fallback` candle / safetensors / tokenizers chain
# and the `--features hailo` hailort-sys FFI surface.

[graph]
# Targets we actually ship: x86 dev hosts + Pi 5 deploys.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[advisories]
# Block on any unfixed vuln (matches cargo-audit job thresholds).
yanked = "deny"
# Iter 174 baseline: 2 unmaintained warnings (paste through candle's
# gemm chain, rustls-pemfile through tonic). Both transitive, no CVEs;
# upstream candle / tonic releases will pull these in eventually.
ignore = [
    "RUSTSEC-2024-0436", # paste — unmaintained, no replacement, transitive via candle
    # Iter 219 — workspace re-inclusion surfaced these (same as
    # cluster's deny.toml; workspace-wide concerns ignored here so
    # the per-crate audit stays green).
    "RUSTSEC-2025-0141", # bincode 1.x unmaintained
    "RUSTSEC-2026-0097", # rand unsound w/ custom logger
]

[licenses]
# Same permissive list as the cluster crate. GPL-family stays denied —
# none in the candle/tokenizers tree as of iter 177.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.93

[bans]
# multiple-versions=warn surfaces dep-tree dup-version cliffs (which
# inflate the binary + slow compile time) without blocking. The candle
# stack pulls some duplicates we can't easily resolve.
multiple-versions = "warn"
wildcards = "deny"
# Iter 202 — same rationale as the cluster's deny.toml: the
# ruvector-hailo crate has a path dep on hailort-sys (in-tree FFI
# wrapper), which cargo-deny treats as a wildcard. Allow path-based
# wildcards explicitly so the bans check still gates real
# version="*" wildcard deps.
allow-wildcard-paths = true
highlight = "all"
deny = []

[sources]
# Only crates.io + the in-tree path deps. Reject any GitHub-direct or
# alternative-registry dep that sneaks in via a future PR.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
