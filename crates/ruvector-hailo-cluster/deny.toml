# cargo-deny config for ruvector-hailo-cluster.
#
# Run with `cargo deny check` after installing cargo-deny.
# CI surfaces this in the hailo-backend-audit workflow (planned iter 92
# follow-up — workflow currently runs cargo-audit; cargo-deny lands once
# this config has had a pass against the dep tree).
#
# Closes ADR-172 §5b/§5c (build supply chain hardening).

[graph]
# Targets we actually ship: x86 dev hosts + Pi 5 deploys.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]

[advisories]
# Block on any unfixed vuln. Same threshold as the cargo-audit job.
yanked = "deny"
# Iter 177 — known unmaintained transitive deps; both have no CVEs,
# no replacement upstream, and would only resolve via tonic/rustls
# bumping their pin sets in a future major release. Documented here
# so cargo-deny advisories pass cleanly.
ignore = [
    "RUSTSEC-2024-0436", # paste — transitive via candle (cpu-fallback feature)
    "RUSTSEC-2025-0134", # rustls-pemfile — transitive via tonic-tls
    # Iter 219 — surfaced by workspace re-inclusion (closes ADR-178
    # Gap E). These advisories existed in the wider workspace dep
    # tree all along; per-crate cargo-deny had a narrower lock that
    # didn't see them. Both are workspace-wide concerns, not specific
    # to the hailo crates; ignored here so the per-crate audit step
    # stays green pending a workspace-wide remediation.
    "RUSTSEC-2025-0141", # bincode 1.x unmaintained — workspace pin via rkyv etc.
    "RUSTSEC-2026-0097", # rand unsound w/ custom logger — workspace transitive
]

[licenses]
# Permissive licenses we accept. GPL-family stays denied for now (no
# GPL deps in the cluster crate; flag if one sneaks in).
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "0BSD",
]
confidence-threshold = 0.93

[bans]
# Explicit bans for things we don't want creeping in.
multiple-versions = "warn"
wildcards = "deny"
# Iter 202 — explicit allow for in-workspace path deps (which
# cargo-deny otherwise treats as wildcards). Without this the bans
# check fails on `path = "../foo"` references like the iter-115
# ruvector-mmwave parser crate or the iter-167 hailort-sys binding.
# Path deps are version-locked-by-construction (they resolve to
# whatever's in the same checkout), so the wildcard-version risk
# this rule normally guards against doesn't apply.
allow-wildcard-paths = true
highlight = "all"

# Deny known-unsound or notoriously slow crates if they appear via
# transitive deps. Empty today; populate as the dep tree grows.
deny = []

[sources]
# Only crates.io. No git or path deps from outside the workspace.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
